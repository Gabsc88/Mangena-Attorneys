<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mangena Attorneys | Justice, Integrity, Excellence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Lato', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        'brand-blue': '#dac19b',
                        'brand-dark': '#161b1e',
                        'brand-light': '#dac19b',
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 1s ease-out forwards',
                        'fade-in': 'fadeIn 1.5s ease-out forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
<style>
    .nav-link-underline {
        position: relative;
        padding-bottom: 6px; /* Give some space for the underline */
    }

    .nav-link-underline::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 0%;
        height: 1px;
        background-color: #dac19b; /* brand-light */
        transition: width 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .nav-link-underline:hover::after {
        width: 100%;
    }

    .no-scrollbar::-webkit-scrollbar {
        display: none;
    }

    .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
    }

    @keyframes progress-ring {
      from {
        stroke-dashoffset: 125.6; /* 2 * PI * 20 */
      }
      to {
        stroke-dashoffset: 0;
      }
    }
</style>
<script type="importmap">

  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

</body>
</html>
